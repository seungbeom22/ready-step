<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABS 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>⚾ ABS (Automatic Ball Strike)</h1>

<div id="cameraBox">

    <video id="video" autoplay playsinline></video>

    <canvas id="canvas"></canvas>

    <div id="zone"></div>

</div>

<div class="info">

    <h2 id="result">READY</h2>

    <p>볼 : <span id="balls">0</span></p>

    <p>스트라이크 : <span id="strikes">0</span></p>

    <p>구속 : <span id="speed">0</span> km/h</p>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 생성기 v2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff9500; --bg: #f0f2f7; --card: #ffffff; --text: #1a1a2e; --history-bg: #e8ecf5; }
        [data-theme="dark"] { --primary: #ff9500; --bg: #0f0f1a; --card: #1c1c2e; --text: #f0f0f0; --history-bg: #14142a; }
        [data-theme="blue"] { --primary: #3b82f6; --bg: #eff6ff; --card: #ffffff; --text: #1e3a5f; --history-bg: #dbeafe; }
        [data-theme="green"] { --primary: #22c55e; --bg: #f0fdf4; --card: #ffffff; --text: #14532d; --history-bg: #dcfce7; }
        [data-theme="pink"] { --primary: #ec4899; --bg: #fdf2f8; --card: #ffffff; --text: #831843; --history-bg: #fce7f3; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100dvh; transition: background 0.3s; }

        #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 90; }
        #overlay.active { display: block; }
        #side-menu { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: #1a1a2e; z-index: 100; transform: translateX(-100%); transition: transform 0.35s; display: flex; flex-direction: column; }
        #side-menu.open { transform: translateX(0); }

        .menu-header { background: linear-gradient(135deg, var(--primary), #ff6b35); padding: 50px 24px 24px; position: relative; }
        .menu-header h2 { font-family: 'Black Han Sans', sans-serif; color: white; font-size: 22px; }
        .closebtn { position: absolute; top: 14px; right: 18px; font-size: 26px; color: white; cursor: pointer; background: none; border: none; }
        .menu-body { padding: 24px; flex: 1; overflow-y: auto; }
        .menu-section-title { font-size: 11px; font-weight: 700; color: #6b7280; margin-bottom: 12px; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 28px; }
        .theme-btn { padding: 10px 8px; border: 2px solid transparent; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 600; color: white; background: #333; }
        .theme-btn.active { border-color: white; outline: 2px solid var(--primary); }
        .dev-note { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; color: #d1d5db; font-size: 13px; }
        .dev-title { color: var(--primary); font-weight: 700; margin-bottom: 6px; }

        .app-wrapper { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; min-height: 100dvh; }
        .app-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 20px 16px; }
        .hamburger { width: 40px; height: 40px; background: var(--card); border-radius: 12px; border: none; cursor: pointer; color: var(--text); }
        .app-title { font-family: 'Black Han Sans', sans-serif; font-size: 26px; color: var(--text); }
        .app-title span { color: var(--primary); }

        .btn-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 0 16px 20px; }
        .btn-row button { padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 13px; }
        .btn-gen { background: var(--primary); color: white; }
        .btn-save { background: #4caf50; color: white; }
        .btn-clear { background: #ff3b30; color: white; }

        .main-card { background: var(--card); margin: 0 16px; border-radius: 24px; padding: 24px 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .number-card { background: #1a1a2e; border-radius: 18px; padding: 24px 16px; margin-top: 20px; min-height: 100px; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .ball { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 15px; opacity: 0; transform: scale(0.5); transition: all 0.5s ease-out; }
        .ball.show { opacity: 1; transform: scale(1); }
        
        .history-section { background: var(--history-bg); flex: 1; margin-top: 16px; padding: 20px 16px 30px; border-radius: 24px 24px 0 0; }
        .history-item { background: var(--card); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; color: var(--text); }
        .btn-delete { background: #ff3b30; color: white; border: none; border-radius: 8px; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay" onclick="closeMenu()"></div>

<nav id="side-menu">
    <div class="menu-header">
        <button class="closebtn" onclick="closeMenu()">✕</button>
        <h2>🎰 로또 생성기</h2>
    </div>
    <div class="menu-body">
        <div class="menu-section-title">테마 색상</div>
        <div class="theme-grid">
            <button class="theme-btn" data-t="default" onclick="setTheme('default', this)">🟠 기본</button>
            <button class="theme-btn" data-t="dark" onclick="setTheme('dark', this)">🌑 다크</button>
            <button class="theme-btn" data-t="blue" onclick="setTheme('blue', this)">🔵 블루</button>
            <button class="theme-btn" data-t="green" onclick="setTheme('green', this)">🟢 그린</button>
            <button class="theme-btn" data-t="pink" onclick="setTheme('pink', this)">🌸 핑크</button>
        </div>
        <div class="menu-section-title">개발자의 말</div>
        <div class="dev-note">
            <div class="dev-title">👋 안녕하세요, 파수범입니다!</div>
            저의 2번째 코딩이니 많관부 부탁합니다.<br><br>
            열심히 만들었습니다. 앞으로도 더 좋은 앱으로 찾아뵙겠습니다! 😊
        </div>
    </div>
</nav>

<div class="app-wrapper">
    <header class="app-header">
        <button class="hamburger" onclick="openMenu()">☰</button>
        <h1 class="app-title">행운의 <span>로또</span></h1>
        <div style="width: 40px;"></div>
    </header>

    <div class="btn-row">
        <button class="btn-gen" onclick="generateLotto()">🎲 추첨</button>
        <button class="btn-save" onclick="saveLotto()">💾 저장</button>
        <button class="btn-clear" onclick="clearAll()">🗑 삭제</button>
    </div>

    <div class="main-card">
        <div class="number-card" id="result">
            <div style="color:white;">숫자를 추첨하세요</div>
        </div>
    </div>

    <section class="history-section">
        <h2 style="margin-bottom:10px; color: var(--text);">📜 추첨 기록</h2>
        <div id="history-list"></div>
    </section>
</div>

<script>
    let lottoHistory = JSON.parse(localStorage.getItem('lottoHistory')) || [];
    let currentNumbers = [];

    function getBallColor(n) {
        if(n <= 10) return '#fbc400';
        if(n <= 20) return '#69c8f2';
        if(n <= 30) return '#ff7272';
        if(n <= 40) return '#aaaaaa';
        return '#b0d840';
    }

    async function generateLotto() {
        currentNumbers = Array.from({length: 45}, (_, i) => i + 1).sort(() => Math.random() - 0.5).slice(0, 6).sort((a, b) => a - b);
        const res = document.getElementById('result');
        res.innerHTML = ''; 
        for(let n of currentNumbers) {
            const ball = document.createElement('div');
            ball.className = 'ball';
            ball.style.backgroundColor = getBallColor(n);
            ball.innerText = n;
            res.appendChild(ball);
            await new Promise(r => setTimeout(r, 400));
            ball.classList.add('show');
        }
    }

    function setTheme(t, btn) {
        document.documentElement.setAttribute('data-theme', t === 'default' ? '' : t);
        localStorage.setItem('lottoTheme', t);
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    window.onload = () => {
        const savedTheme = localStorage.getItem('lottoTheme') || 'default';
        const btn = document.querySelector(`[data-t="${savedTheme}"]`);
        if(btn) setTheme(savedTheme, btn);
    };

    function openMenu() { document.getElementById('side-menu').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
    function closeMenu() { document.getElementById('side-menu').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }

    function saveLotto() {
        if(currentNumbers.length === 0) return alert("추첨 먼저!");
        lottoHistory.unshift(currentNumbers);
        localStorage.setItem('lottoHistory', JSON.stringify(lottoHistory));
        updateUI();
    }

    function clearAll() { 
        if(confirm("정말로 전체 기록을 삭제하시겠습니까?")) {
            lottoHistory = []; localStorage.removeItem('lottoHistory'); updateUI(); 
        }
    }
    
    function updateUI() {
        const list = document.getElementById('history-list');
        list.innerHTML = lottoHistory.map((n, i) => `
            <div class="history-item">
                <span>${n.join(', ')}</span>
                <button class="btn-delete" onclick="del(${i})">삭제</button>
            </div>`).join('');
    }
    
    function del(i) { 
        if(confirm("이 기록을 삭제하시겠습니까?")) {
            lottoHistory.splice(i, 1); localStorage.setItem('lottoHistory', JSON.stringify(lottoHistory)); updateUI(); 
        }
    }

    updateUI();
</script>
</body>
</html>

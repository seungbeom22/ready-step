<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 생성기 v1.3</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; }
        .result-container { display: flex; justify-content: center; gap: 5px; margin: 30px 0; min-height: 50px; }
        .ball { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        button { padding: 12px 20px; margin: 5px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-gen { background-color: #ffc107; }
        .btn-save { background-color: #4caf50; color: white; }
        .btn-clear { background-color: #ff3b30; color: white; }
        #history { margin-top: 30px; }
        .history-item { margin: 8px 0; font-size: 14px; color: #555; }
    </style>
</head>
<body>

    <h1>🎰 행운의 로또 생성기</h1>
    
    <div class="action-btns">
        <button class="btn-gen" onclick="generateLotto()">번호 추첨하기</button>
        <button class="btn-save" onclick="saveLotto()">기록 저장하기</button>
        <button class="btn-clear" onclick="clearHistory()">전체 기록 지우기</button>
    </div>

    <div class="result-container" id="result"></div>
    
    <div id="history">
        <h3>📜 추첨 기록</h3>
        <div id="history-list"></div>
    </div>

    <script>
        let currentNumbers = [];
        let lottoHistory = JSON.parse(localStorage.getItem('lottoHistory')) || [];
        updateHistoryUI();

        function getBallColor(num) {
            if (num <= 10) return '#fbc400';
            if (num <= 20) return '#69c8f2';
            if (num <= 30) return '#ff7272';
            if (num <= 40) return '#aaaaaa';
            return '#b0d840';
        }

        function generateLotto() {
            currentNumbers = [];
            while(currentNumbers.length < 6) {
                const num = Math.floor(Math.random() * 45) + 1;
                if(!currentNumbers.includes(num)) currentNumbers.push(num);
            }
            currentNumbers.sort((a, b) => a - b);

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '';
            currentNumbers.forEach(num => {
                const ball = document.createElement('div');
                ball.className = 'ball';
                ball.innerText = num;
                ball.style.backgroundColor = getBallColor(num);
                resultDiv.appendChild(ball);
            });
        }

        function saveLotto() {
            if (currentNumbers.length === 0) {
                alert("먼저 번호를 추첨해주세요!");
                return;
            }
            lottoHistory.unshift(currentNumbers.join(', '));
            localStorage.setItem('lottoHistory', JSON.stringify(lottoHistory));
            updateHistoryUI();
        }

        function clearHistory() {
            if(confirm("정말로 모든 기록을 삭제하시겠습니까?")) {
                lottoHistory = [];
                localStorage.removeItem('lottoHistory');
                updateHistoryUI();
            }
        }

        function updateHistoryUI() {
            const historyList = document.getElementById('history-list');
            historyList.innerHTML = '';
            lottoHistory.forEach((item, index) => {
                const p = document.createElement('p');
                p.className = 'history-item';
                p.innerText = `${lottoHistory.length - index}회차: [ ${item} ]`;
                historyList.appendChild(p);
            });
        }
    </script>
</body>
</html>
